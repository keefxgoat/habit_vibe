<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация · Habit Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body.dark {
            background: linear-gradient(135deg, #1e2b3f, #0f1a2b);
            color: #e0e0e0;
        }

        body.dark .register-card {
            background: rgba(30, 35, 45, 0.9);
            border: 1px solid #3a4455;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        body.dark input {
            background: #252e3b;
            border-color: #3a4455;
            color: #f0f0f0;
        }

        body.dark input:focus {
            border-color: #6d8aff;
            box-shadow: 0 0 0 3px rgba(109, 138, 255, 0.2);
        }

        body.dark .register-btn {
            background: linear-gradient(135deg, #4a6cf7, #3b5bdb);
        }

        body.dark .register-btn:hover {
            background: linear-gradient(135deg, #5b7aff, #4a6cf7);
        }

        body.dark .theme-toggle {
            background: #252e3b;
            border-color: #3a4455;
        }

        body.dark .emoji-bubble {
            background: #2f3a4a;
            color: #ffd966;
        }

        body.light {
            background: linear-gradient(135deg, #f0f4ff, #d9e2fa);
            color: #1e2b3f;
        }

        body.light .register-card {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #d0d9f0;
            box-shadow: 0 15px 35px rgba(0, 20, 50, 0.15);
            backdrop-filter: blur(10px);
        }

        body.light input {
            background: white;
            border-color: #d0d9f0;
            color: #1e2b3f;
        }

        body.light input:focus {
            border-color: #4a6cf7;
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.15);
        }

        body.light .register-btn {
            background: linear-gradient(135deg, #4a6cf7, #3b5bdb);
            color: white;
        }

        body.light .register-btn:hover {
            background: linear-gradient(135deg, #5b7aff, #4a6cf7);
            box-shadow: 0 10px 20px rgba(74, 108, 247, 0.3);
        }

        body.light .theme-toggle {
            background: white;
            border-color: #d0d9f0;
            color: #4a6cf7;
        }

        body.light .theme-toggle:hover {
            background: #f0f4ff;
        }

        body.light .emoji-bubble {
            background: white;
            color: #ff8800;
            border: 1px solid #ffaa00;
        }

        .home-link {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        
        .home-link a {
            color: inherit;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            transition: opacity 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .home-link a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .register-card {
            max-width: 400px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.8s ease-out;
            position: relative;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        h1 span {
            display: inline-block;
            animation: wave 2s infinite;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border-radius: 15px;
            font-size: 1rem;
            outline: none;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            bottom: 15px;
            font-size: 1.2rem;
            opacity: 0.6;
            pointer-events: none;
        }

        .register-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .register-btn:hover {
            transform: translateY(-3px);
        }

        .register-btn:active {
            transform: translateY(0);
        }

        .register-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        .register-btn:focus:not(:active)::after {
            animation: ripple 1s ease-out;
        }

        @keyframes ripple {
            0% {
                transform: scale(0, 0);
                opacity: 0.5;
            }
            100% {
                transform: scale(20, 20);
                opacity: 0;
            }
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            border: 2px solid;
            transition: all 0.3s;
            background: inherit;
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(15deg);
        }

        .emoji-bubble {
            position: absolute;
            bottom: -20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            animation: float 3s infinite ease-in-out;
            pointer-events: none;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .login-link a {
            color: inherit;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px dashed;
            transition: opacity 0.2s;
        }

        .login-link a:hover {
            opacity: 0.7;
        }

        .error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        @media (max-width: 480px) {
            .register-card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .emoji-bubble {
                display: none;
            }
        }
    </style>
</head>
<body class="dark">
    <div class="register-card">
        <div class="theme-toggle" id="themeToggle" title="Сменить тему">
            🌓
        </div>

        <div class="home-link">
            <a href="/static/landing.html">← На главную</a>
        </div>

        <h1>
            <span></span> Регистрация <span></span>
        </h1>

        <div class="input-group">
            <label>👤 Имя пользователя</label>
            <span class="input-icon">👤</span>
            <input type="text" placeholder="например, habit_master" id="username">
        </div>

        <div class="input-group">
            <label>🔒 Пароль</label>
            <span class="input-icon">🔒</span>
            <input type="password" placeholder="••••••••" id="password">
        </div>

        <button class="register-btn" id="registerBtn">
                Создать аккаунт
        </button>

        <div class="error-message" id="message"></div>

        <div class="emoji-bubble" id="emojiBubble">
                Придумай надёжный пароль
        </div>

        <div class="login-link">
            Уже есть аккаунт? <a href="/static/login-page.html">Войти</a>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            body.classList.remove('dark', 'light');
            body.classList.add(savedTheme);
            themeToggle.textContent = savedTheme === 'dark' ? '🌓' : '🌓';
        }

        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('dark')) {
                body.classList.remove('dark');
                body.classList.add('light');
                themeToggle.textContent = '🌓';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light');
                body.classList.add('dark');
                themeToggle.textContent = '🌓';
                localStorage.setItem('theme', 'dark');
            }
        });

        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const registerBtn = document.getElementById('registerBtn');
        const emojiBubble = document.getElementById('emojiBubble');
        const messageDiv = document.getElementById('message');

        usernameInput.addEventListener('focus', () => {
            emojiBubble.textContent = 'Имя должно быть уникальным';
        });

        passwordInput.addEventListener('focus', () => {
            emojiBubble.textContent = 'Минимум 6 символов';
        });

        [usernameInput, passwordInput].forEach(input => {
            input.addEventListener('blur', () => {
                emojiBubble.textContent = '💡 Придумай надёжный пароль';
            });
        });

        registerBtn.addEventListener('mouseenter', () => {
            emojiBubble.textContent = '⚡ Жми, не бойся!';
        });

        registerBtn.addEventListener('mouseleave', () => {
            emojiBubble.textContent = '💡 Придумай надёжный пароль';
        });

        registerBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                messageDiv.textContent = 'Заполни все поля!';
                return;
            }

            if (password.length < 6) {
                messageDiv.textContent = 'Пароль слишком короткий (минимум 6 символов)';
                emojiBubble.textContent = 'Слишком коротко!';
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = '⏳ Отправка...';

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.textContent = '✅ Регистрация успешна! Перенаправляем...';
                    messageDiv.style.color = '#4caf50';
                    emojiBubble.textContent = '🎉 Добро пожаловать!';
                    
                    setTimeout(() => {
                        window.location.href = '/static/login-page.html';
                    }, 2000);
                } else {
                    messageDiv.textContent = `❌ ${data.detail || 'Ошибка регистрации'}`;
                    messageDiv.style.color = '#ff6b6b';
                    emojiBubble.textContent = '😢 Что-то пошло не так';
                    registerBtn.disabled = false;
                    registerBtn.textContent = '✨ Создать аккаунт ✨';
                }
            } catch (error) {
                messageDiv.textContent = '❌ Ошибка соединения с сервером';
                emojiBubble.textContent = '🔌 Проверь сервер';
                registerBtn.disabled = false;
                registerBtn.textContent = '✨ Создать аккаунт ✨';
            }
        });
    </script>
</body>
</html>
